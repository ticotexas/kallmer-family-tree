<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kallmer Family Archive</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=IBM+Plex+Mono:wght@400&family=Source+Serif+4:wght@400;500&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --ledger-ink: #1F2E45;
            --prairie-wheat: #E8DCC3;
            --homestead-clay: #A8552E;
            --prairie-sage: #6B7C5A;
            --brass: #B08D3F;
        }

        body {
            margin: 0;
            background: var(--prairie-wheat);
            color: var(--ledger-ink);
            font-family: "Source Serif 4", serif;
        }

        .hero {
            max-width: 900px;
            margin: 0 auto;
            padding: 70px 30px;
            text-align: center;
        }

        h1 {
            font-family: "Fraunces", serif;
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .tagline {
            font-size: 1.4rem;
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto 30px auto;
        }

        .stats {
            font-family: "IBM Plex Mono", monospace;
            margin-bottom: 30px;
            color: var(--prairie-sage);
        }

        .button {
            display: inline-block;
            text-decoration: none;
            padding: 14px 28px;
            border: 2px solid var(--homestead-clay);
            color: var(--homestead-clay);
            border-radius: 4px;
            transition: 0.2s;
        }

        .button:hover {
            background: var(--homestead-clay);
            color: white;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            color: var(--prairie-sage);
            font-size: 0.9rem;
        }

        .archive-logo {
            max-width: 560px;
            width: 100%;
            margin: 0 auto 25px;
        }

        @media (max-width: 700px) {
            .archive-logo {
                max-width: 95%;
            }
        }

        .site-footer {
            margin-top: 80px;
            margin-bottom: 30px;
            text-align: center;
            color: var(--prairie-sage);
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="hero">

        <img src="images/kallmer-archive-logo.png" alt="The Kallmer Family Archive" class="archive-logo">

        <p class="tagline">
            Tracing the lives, migrations, and stories of the families who journeyed from Sweden and Germany to the
            American prairie — and the generations that followed.
        </p>

        <div class="stats" id="archive-stats">
            Loading archive stats...
        </div>

        <a href="tree.html" class="button">
            Begin Your Journey
        </a>

    </div>

    <footer class="site-footer">
        Version 1.1 • July 2026
    </footer>



    <script>
        fetch("public-data/family.json?v=" + Date.now())
            .then(response => response.json())
            .then(data => {
                const peopleCount = data.people.length;
                const familyCount = data.families.length;

                document.getElementById("archive-stats").textContent =
                    `${peopleCount} individuals • ${familyCount} families • 8 generations`;
            })
            .catch(() => {
                document.getElementById("archive-stats").textContent =
                    "Family archive in progress";
            });
    </script>

</body>

</html>
