<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kallmer Family Archive</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=IBM+Plex+Mono:wght@400&family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">

<style>

:root {
    --ledger-ink: #1F2E45;
    --prairie-wheat: #E8DCC3;
    --homestead-clay: #A8552E;
    --prairie-sage: #6B7C5A;
    --brass: #B08D3F;
}

body {
    margin: 0;
    background: var(--prairie-wheat);
    color: var(--ledger-ink);
    font-family: "Source Serif 4", serif;
}

.hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 100px 30px;
    text-align: center;
}

h1 {
    font-family: "Fraunces", serif;
    font-size: 4rem;
    margin-bottom: 20px;
}

.tagline {
    font-size: 1.4rem;
    line-height: 1.6;
    max-width: 700px;
    margin: 0 auto 40px auto;
}

.stats {
    font-family: "IBM Plex Mono", monospace;
    margin-bottom: 40px;
    color: var(--prairie-sage);
}

.button {
    display: inline-block;
    text-decoration: none;
    padding: 14px 28px;
    border: 2px solid var(--homestead-clay);
    color: var(--homestead-clay);
    border-radius: 4px;
    transition: 0.2s;
}

.button:hover {
    background: var(--homestead-clay);
    color: white;
}

footer {
    margin-top: 100px;
    text-align: center;
    color: var(--prairie-sage);
    font-size: 0.9rem;
}

</style>
</head>

<body>

<div class="hero">

<h1>The Kallmer Family Archive</h1>

<p class="tagline">
Tracing the lives, migrations, and stories of the families
who journeyed from Sweden and Germany to the American prairie.
</p>

<div class="stats">
184 documented individuals
</div>

<a href="#" class="button">
Explore the Tree
</a>

<footer>
Version 0.1 • July 2026
</footer>

</div>

</body>
</html>
