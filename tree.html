<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Family Tree</title>

  <style>
    :root {
      --ledger-ink: #1f2e45;
      --prairie-wheat: #e8dcc3;
      --homestead-clay: #a8552e;
      --prairie-sage: #6b7c5a;
      --brass: #b08d3f;
    }

    body {
      margin: 0;
      background: var(--prairie-wheat);
      font-family: serif;
      color: var(--ledger-ink);
    }

    header {
      padding: 20px;
      border-bottom: 1px solid var(--brass);
    }

    h1 {
      margin: 0;
    }

    #content {
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    #tree {
      flex: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .person {
      width: 260px;
      min-height: 130px;
      box-sizing: border-box;
    }

    #details {
      flex: 1;
      background: white;
      border: 1px solid var(--brass);
      padding: 24px;
      position: sticky;
      top: 20px;
      min-height: 180px;
    }

    .person {
      border: 1px solid var(--brass);
      background: white;
      padding: 20px;
      min-width: 250px;
      width: 260px;
      text-align: center;
    }

    .person h2 {
      margin-top: 0;
    }

    .mono {
      font-family: monospace;
      color: var(--prairie-sage);
    }

    #tree {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 40px;
      height: auto;
    }


    .person-card-selected {
      border: 3px solid var(--homestead-clay);
    }

    .person-link {
      border: 0;
      background: none;
      padding: 0;
      color: var(--ledger-ink);
      font-family: inherit;
      font-size: inherit;
      text-align: left;
      cursor: pointer;
      text-decoration: underline;
    }

    .person-link:hover {
      color: var(--homestead-clay);
    }

    .pedigree-chart {
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .generation-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .generation-label {
      width: 100%;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      color: var(--prairie-sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: -8px;
    }

    .pedigree-person {
      border: 1px solid var(--brass);
      background: #fffaf0;
      padding: 10px 12px;
      min-width: 180px;
      max-width: 220px;
      cursor: pointer;
    }

    .pedigree-person:hover {
      border-color: var(--homestead-clay);
    }

    .pedigree-person.current {
      border: 2px solid var(--homestead-clay);
      background: #fff4df;
    }

    .pedigree-name {
      font-weight: 600;
    }
  </style>
</head>

<body>
  <header>
    <h1>Kallmer Family Tree</h1>
  </header>

  <div id="content">

    <div id="tree"></div>

    <div id="details">

      <h2 id="detail-name">
        Select a Person
      </h2>

      <p class="mono" id="detail-dates"></p>

      <p id="detail-place"></p>

    </div>

  </div>
  <h2 id="detail-name"></h2>

  <p class="mono" id="detail-dates"></p>

  <p id="detail-place"></p>
  </div>

  <script>
    fetch("public-data/family.json")
      .then((response) => response.json())
      .then((data) => {
        const tree = document.getElementById("tree");

        const peopleById = {};
        data.people.forEach(person => {
          peopleById[person.id] = person;
        });

        function lifeDates(person) {
          return `${person.birth || "?"}${person.death ? "–" + person.death : "–"}`;
        }

        function personButton(person) {
          return `
        <button class="person-link" data-person-id="${person.id}">
          ${person.name} (${lifeDates(person)})
        </button>
      `;
        }

        function namesFromIds(ids) {
          if (!ids || ids.length === 0) return "None listed";

          return ids
            .map(id => peopleById[id])
            .filter(Boolean)
            .map(personButton)
            .join("<br>");
        }

        function marriageText(person) {
          if (!person.marriages || person.marriages.length === 0) return "";

          return person.marriages.map(m => {
            const spouse = peopleById[m.spouse];
            const spouseName = spouse ? personButton(spouse) : m.spouse;
            const details = [m.date, m.place].filter(Boolean).join(" — ");

            return details
              ? `${spouseName}<br><span class="mono">${details}</span>`
              : spouseName;
          }).join("<br><br>");
        }

        function uniquePeople(people) {
          const seen = new Set();
          return people.filter(person => {
            if (!person || seen.has(person.id)) return false;
            seen.add(person.id);
            return true;
          });
        }

        function getParents(person) {
          return (person.parents || [])
            .map(id => peopleById[id])
            .filter(Boolean);
        }

        function buildAncestorGenerations(person, depth = 3) {
          const generations = [];
          let currentGeneration = [person];

          for (let i = 0; i < depth; i++) {
            const parents = uniquePeople(
              currentGeneration.flatMap(p => getParents(p))
            );

            if (parents.length === 0) break;

            generations.push(parents);
            currentGeneration = parents;
          }

          return generations.reverse();
        }

        function pedigreeCard(person, isCurrent = false) {
          return `
    <div class="pedigree-person ${isCurrent ? "current" : ""}" data-person-id="${person.id}">
      <div class="pedigree-name">${person.name}</div>
      <div class="mono">${lifeDates(person)}</div>
    </div>
  `;
        }

        function renderPedigree(person) {
          const ancestorGenerations = buildAncestorGenerations(person, 3);

          const labels = {
            0: "Parents",
            1: "Grandparents",
            2: "Great-grandparents"
          };

          const rows = ancestorGenerations.map((generation, index) => {
            const generationsBack = ancestorGenerations.length - index - 1;
            const label = labels[generationsBack] || `${generationsBack + 1} generations back`;

            return `
      <div class="generation-row">
        <div class="generation-label">${label}</div>
        ${generation.map(p => pedigreeCard(p)).join("")}
      </div>
    `;
          }).join("");

          tree.innerHTML = `
    <div class="pedigree-chart">
      ${rows}
      <div class="generation-row">
        <div class="generation-label">Current person</div>
        ${pedigreeCard(person, true)}
      </div>
    </div>
  `;

          document.querySelectorAll(".pedigree-person").forEach(card => {
            card.onclick = () => {
              const nextPerson = peopleById[card.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function attachPersonLinkHandlers() {
          document.querySelectorAll(".person-link").forEach(button => {
            button.onclick = () => {
              const nextPerson = peopleById[button.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function showDetails(person) {
          renderPedigree(person);

          document.getElementById("details").style.display = "block";
          document.getElementById("detail-name").textContent = person.name;
          document.getElementById("detail-dates").textContent = lifeDates(person);

          document.getElementById("detail-place").innerHTML = `
        ${person.place ? `<p>${person.place}</p>` : ""}

        <h3>Parents</h3>
        <p>${namesFromIds(person.parents)}</p>

        <h3>Spouse / Marriage</h3>
        <p>${marriageText(person) || namesFromIds(person.spouses)}</p>

        <h3>Children</h3>
        <p>${namesFromIds(person.children)}</p>

        <h3>Siblings</h3>
        <p>${namesFromIds(person.siblings)}</p>
      `;

          attachPersonLinkHandlers();
        }

        const startPerson = peopleById["I0000"] || data.people[0];
        showDetails(startPerson);
      });
  </script>

</body>

</html>
