<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Family Tree</title>

    <style>
      :root {
        --ledger-ink: #1f2e45;
        --prairie-wheat: #e8dcc3;
        --homestead-clay: #a8552e;
        --prairie-sage: #6b7c5a;
        --brass: #b08d3f;
      }

      body {
        margin: 0;
        background: var(--prairie-wheat);
        font-family: serif;
        color: var(--ledger-ink);
      }

      header {
        padding: 20px;
        border-bottom: 1px solid var(--brass);
      }

      h1 {
        margin: 0;
      }

      #tree {
        height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .person {
        border: 1px solid var(--brass);
        background: white;
        padding: 20px;
        min-width: 250px;
        text-align: center;
      }

      .person h2 {
        margin-top: 0;
      }

      .mono {
        font-family: monospace;
        color: var(--prairie-sage);
      }

      #tree {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        padding: 40px;
        height: auto;
      }

      .person {
        width: 260px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Kallmer Family Tree</h1>
    </header>

    <div id="tree"></div>

    <script>
      fetch("public-data/family.json")
        .then((response) => response.json())
        .then((data) => {
          const tree = document.getElementById("tree");

          data.people.slice(0, 10).forEach((person) => {
            const card = document.createElement("div");

            card.className = "person";

            card.innerHTML = `
    <h2>${person.name}</h2>
    <p class="mono">
        ${person.birth}${person.death ? "–" + person.death : "–"}
    </p>
`;
            card.style.cursor = "pointer";

            card.onclick = () => {
              alert(
                person.name +
                  "\n" +
                  "Born: " +
                  (person.birth || "Unknown") +
                  "\n" +
                  "Died: " +
                  (person.death || "Living/Unknown") +
                  "\n" +
                  (person.place ? "Place: " + person.place : ""),
              );
            };

            tree.appendChild(card);
          });
        });
    </script>
  </body>
</html>
