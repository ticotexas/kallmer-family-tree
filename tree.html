<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kallmer Family Tree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=IBM+Plex+Mono:wght@400&family=Source+Serif+4:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --ledger-ink: #1f2e45;
      --prairie-wheat: #e8dcc3;
      --homestead-clay: #a8552e;
      --prairie-sage: #6b7c5a;
      --brass: #b08d3f;
      --paper: #fffaf0;
      --white: #ffffff;
    }

    body {
      margin: 0;
      background: var(--prairie-wheat);
      font-family: "Source Serif 4", serif;
      color: var(--ledger-ink);
    }

    header {
      padding: 22px 40px;
      border-bottom: 1px solid var(--brass);
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 2.4rem;
    }


    #search-area {
      margin-top: 18px;
      max-width: 420px;
      position: relative;
    }

    #person-search {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid var(--brass);
      border-radius: 4px;
      background: var(--paper);
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      font-size: 1rem;
    }

    #person-search:focus {
      outline: 2px solid var(--homestead-clay);
      outline-offset: 2px;
    }

    #search-results {
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: 280px;
      overflow-y: auto;
      background: var(--paper);
      border: 1px solid var(--brass);
      border-radius: 4px;
      box-shadow: 0 8px 22px rgba(31, 46, 69, 0.18);
    }

    .search-result {
      display: block;
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(176, 141, 63, 0.35);
      background: none;
      padding: 10px 12px;
      text-align: left;
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      cursor: pointer;
    }

    .search-result:hover,
    .search-result:focus {
      background: #fff4df;
      color: var(--homestead-clay);
      outline: none;
    }

    .search-result-name {
      display: block;
      font-weight: 600;
    }

    .search-result-dates {
      display: block;
      margin-top: 2px;
    }

    .search-empty {
      padding: 10px 12px;
    }

    #content {
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    #tree {
      flex: 2;
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    #details {
      flex: 1;
      background: var(--ledger-ink);
      color: var(--paper);
      border: 2px solid var(--brass);
      border-radius: 6px;
      padding: 28px;
      position: sticky;
      top: 20px;
      min-height: 180px;
      max-width: 390px;
      box-sizing: border-box;
      box-shadow: 0 8px 22px rgba(31, 46, 69, 0.22);
    }

    #details h2 {
      margin-top: 0;
      font-family: "Fraunces", serif;
      color: var(--homestead-clay);
      font-size: 1.8rem;
      line-height: 1.1;
    }

    #details h3 {
      margin-top: 28px;
      color: var(--brass);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #details .mono {
      color: #b7c69f;
    }

    #details .person-link {
      color: var(--paper);
    }

    #details .person-link:hover {
      color: var(--homestead-clay);
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
      color: var(--prairie-sage);
      font-size: 0.9rem;
    }

    .person-link {
      border: 0;
      background: none;
      padding: 0;
      color: var(--ledger-ink);
      font-family: inherit;
      font-size: inherit;
      text-align: left;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .person-link:hover {
      color: var(--homestead-clay);
    }

    .pedigree-chart {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }

    .ancestor-branches {
      display: grid;
      grid-template-columns: repeat(2, minmax(270px, 1fr));
      gap: 28px;
      align-items: start;
      justify-items: center;
    }

    .ancestor-branch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .great-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .generation-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .branch-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--prairie-sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: -6px;
    }

    .generation-label {
      width: 100%;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      color: var(--prairie-sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: -10px;
    }

    .pedigree-couple {
      border: 1px solid var(--brass);
      background: var(--paper);
      padding: 13px 15px;
      width: 270px;
      min-height: 118px;
      min-width: 270px;
      max-width: 270px;
      box-sizing: border-box;
      text-align: center;
      box-shadow: 0 1px 0 rgba(31, 46, 69, 0.08);
    }

    .pedigree-couple.placeholder {
      visibility: hidden;
      pointer-events: none;
    }

    .pedigree-couple.current {
      border: 2px solid var(--homestead-clay);
      background: #fff4df;
    }

    .pedigree-person-name {
      display: block;
      width: 100%;
      border: 0;
      background: none;
      padding: 0;
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    .pedigree-person-name:hover {
      color: var(--homestead-clay);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .couple-divider {
      font-family: "IBM Plex Mono", monospace;
      color: var(--brass);
      font-size: 0.75rem;
      margin: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pedigree-dates {
      margin-top: 4px;
    }

    @media (max-width: 900px) {
      #content {
        flex-direction: column;
        padding: 24px;
      }

      #details {
        position: static;
        max-width: none;
        width: 100%;
      }

      .ancestor-branches {
        grid-template-columns: 1fr;
      }

      .pedigree-couple {
        width: 100%;
        min-width: 0;
        max-width: 360px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Kallmer Family Tree</h1>
    <div id="search-area">
      <input type="text" id="person-search" placeholder="Search for a person..." autocomplete="off" />
      <div id="search-results"></div>
    </div>
  </header>

  <div id="content">
    <div id="tree"></div>

    <div id="details">
      <h2 id="detail-name">Select a Person</h2>
      <p class="mono" id="detail-dates"></p>
      <div id="detail-place"></div>
    </div>
  </div>

  <script>
    fetch("public-data/family.json?v=" + Date.now())
      .then((response) => response.json())
      .then((data) => {
        const tree = document.getElementById("tree");
        const searchInput = document.getElementById("person-search");

        searchInput.addEventListener("focus", () => {
          setTimeout(() => searchInput.select(), 0);
        });

        searchInput.addEventListener("click", () => {
          searchInput.select();
        });

        const searchResults = document.getElementById("search-results");

        const peopleById = {};
        data.people.forEach(person => {
          peopleById[person.id] = person;
        });


        function normalizeText(text) {
          return (text || "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[̀-ͯ]/g, "")
            .replace(/ł/g, "l")
            .replace(/ø/g, "o")
            .replace(/æ/g, "ae")
            .replace(/œ/g, "oe")
            .replace(/ð/g, "d")
            .replace(/þ/g, "th");
        }

        const searchablePeople = data.people.map(person => ({
          person,
          searchName: normalizeText(person.name)
        }));

        function hideSearchResults() {
          searchResults.style.display = "none";
          searchResults.innerHTML = "";
        }

        function renderSearchResults(matches) {
          if (matches.length === 0) {
            searchResults.innerHTML = `<div class="mono search-empty">No matching people found</div>`;
            searchResults.style.display = "block";
            return;
          }

          searchResults.innerHTML = matches.map(({ person }) => `
            <button class="search-result" data-person-id="${person.id}">
              <span class="search-result-name">${person.name}</span>
              <span class="mono search-result-dates">${lifeDates(person)}</span>
            </button>
          `).join("");

          searchResults.style.display = "block";

          searchResults.querySelectorAll(".search-result").forEach(button => {
            button.onclick = () => {
              const selectedPerson = peopleById[button.dataset.personId];
              if (selectedPerson) {
                showDetails(selectedPerson);
                searchInput.value = selectedPerson.name;
                hideSearchResults();
              }
            };
          });
        }

        function setupSearch() {
          searchInput.addEventListener("input", () => {
            const query = normalizeText(searchInput.value.trim());

            if (query.length < 2) {
              hideSearchResults();
              return;
            }

            const matches = searchablePeople
              .filter(({ searchName }) => searchName.includes(query))
              .slice(0, 12);

            renderSearchResults(matches);
          });

          searchInput.addEventListener("keydown", event => {
            if (event.key === "Escape") {
              hideSearchResults();
              searchInput.blur();
            }
          });

          document.addEventListener("click", event => {
            if (!event.target.closest("#search-area")) {
              hideSearchResults();
            }
          });
        }

        function ageText(person) {
          if (!person || !person.birth) return "";

          const birthYear = parseInt(person.birth, 10);
          if (Number.isNaN(birthYear)) return "";

          if (person.death) {
            const deathYear = parseInt(person.death, 10);
            if (Number.isNaN(deathYear)) return "";
            return ` (${deathYear - birthYear})`;
          }

          const currentYear = new Date().getFullYear();
          return ` (${currentYear - birthYear})`;
        }

        function lifeDates(person) {
          if (!person) return "";
          const birth = person.birth || "?";
          const death = person.death ? `–${person.death}` : "–present";
          return `${birth}${death}${ageText(person)}`;
        }

        function birthPlace(person) {
          if (!person) return "";
          return person.birth_place || person.birthPlace || person.place || "";
        }

        function personButton(person) {
          return `
            <button class="person-link" data-person-id="${person.id}">
              ${person.name} ${lifeDates(person)}
            </button>
          `;
        }

        function namesFromIds(ids) {
          if (!ids || ids.length === 0) return "None listed";

          return ids
            .map(id => peopleById[id])
            .filter(Boolean)
            .map(personButton)
            .join("<br>");
        }

        function marriageText(person) {
          if (!person.marriages || person.marriages.length === 0) return "";

          return person.marriages.map(m => {
            const spouse = peopleById[m.spouse];
            const spouseName = spouse ? personButton(spouse) : m.spouse;
            const details = [m.date, m.place].filter(Boolean).join(" — ");

            return details
              ? `${spouseName}<br><span class="mono">${details}</span>`
              : spouseName;
          }).join("<br><br>");
        }

        function getParents(person) {
          return (person.parents || [])
            .map(id => peopleById[id])
            .filter(Boolean);
        }

        function getPrimarySpouse(person) {
          if (!person || !person.spouses || person.spouses.length === 0) return null;
          return peopleById[person.spouses[0]] || null;
        }

        function coupleKey(personA, personB) {
          const ids = [personA && personA.id, personB && personB.id]
            .filter(Boolean)
            .sort();
          return ids.join("+");
        }

        function uniquePeople(people) {
          const seen = new Set();
          return people.filter(person => {
            if (!person || seen.has(person.id)) return false;
            seen.add(person.id);
            return true;
          });
        }

        function parentCoupleFor(child) {
          const parents = getParents(child);
          if (parents.length === 0) return null;
          return { personA: parents[0] || null, personB: parents[1] || null };
        }

        function buildGrandparentBranches(person) {
          const parents = getParents(person);

          return parents.map(parent => {
            const grandparentCouple = parentCoupleFor(parent);
            if (!grandparentCouple) return null;

            const greatCouples = [
              grandparentCouple.personA ? parentCoupleFor(grandparentCouple.personA) : null,
              grandparentCouple.personB ? parentCoupleFor(grandparentCouple.personB) : null
            ];

            return {
              parent,
              grandparentCouple,
              greatCouples
            };
          }).filter(Boolean);
        }

        function pedigreePersonLine(person) {
          if (!person) return `<div class="mono">Unknown</div>`;

          return `
            <button class="pedigree-person-name" data-person-id="${person.id}">
              ${person.name}
            </button>
            <div class="mono pedigree-dates">${lifeDates(person)}</div>
          `;
        }

        function pedigreeCoupleCard(couple, isCurrent = false) {
          const personA = couple.personA;
          const personB = couple.personB;

          return `
            <div class="pedigree-couple ${isCurrent ? "current" : ""}">
              ${pedigreePersonLine(personA)}
              ${personB ? `<div class="couple-divider">and</div>${pedigreePersonLine(personB)}` : ""}
            </div>
          `;
        }

        function renderPedigree(person) {
          const branches = buildGrandparentBranches(person);
          const parentCouple = parentCoupleFor(person);

          const branchMarkup = branches.length ? `
            <div class="ancestor-branches">
              ${branches.map(branch => `
                <div class="ancestor-branch">
                  <div class="branch-label">Great-grandparents</div>
                  <div class="great-stack">
                    ${branch.greatCouples.map(couple =>
            couple
              ? pedigreeCoupleCard(couple)
              : `<div class="pedigree-couple placeholder"></div>`
          ).join("")}
                  </div>
                  <div class="branch-label">Grandparents</div>
                  ${pedigreeCoupleCard(branch.grandparentCouple)}
                </div>
              `).join("")}
            </div>
          ` : "";

          tree.innerHTML = `
            <div class="pedigree-chart">
              ${branchMarkup}

              ${parentCouple ? `
                <div class="generation-row">
                  <div class="generation-label">Parents</div>
                  ${pedigreeCoupleCard(parentCouple)}
                </div>
              ` : ""}

              <div class="generation-row">
                <div class="generation-label">Current family</div>
                ${pedigreeCoupleCard({ personA: person, personB: getPrimarySpouse(person) }, true)}
              </div>
            </div>
          `;

          attachPedigreeHandlers();
        }

        function attachPedigreeHandlers() {
          document.querySelectorAll(".pedigree-person-name").forEach(button => {
            button.onclick = () => {
              const nextPerson = peopleById[button.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function attachPersonLinkHandlers() {
          document.querySelectorAll(".person-link").forEach(button => {
            button.onclick = () => {
              const nextPerson = peopleById[button.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function showDetails(person) {
          renderPedigree(person);

          document.getElementById("detail-name").textContent = person.name;
          document.getElementById("detail-dates").textContent = lifeDates(person);
          const place = birthPlace(person);

          document.getElementById("detail-place").innerHTML = `
            ${place ? `<p class="mono">Born: ${place}</p>` : ""}

            <h3>Parents</h3>
            <p>${namesFromIds(person.parents)}</p>

            <h3>Spouse / Marriage</h3>
            <p>${marriageText(person) || namesFromIds(person.spouses)}</p>

            <h3>Children</h3>
            <p>${namesFromIds(person.children)}</p>

            <h3>Siblings</h3>
            <p>${namesFromIds(person.siblings)}</p>
          `;

          attachPersonLinkHandlers();
        }

        setupSearch();

        const startPerson = peopleById["I0000"] || data.people[0];
        showDetails(startPerson);
      });
  </script>

</body>

</html>
