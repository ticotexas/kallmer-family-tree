<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Kallmer Family Tree</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=IBM+Plex+Mono:wght@400&family=Source+Serif+4:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --ledger-ink: #1f2e45;
      --prairie-wheat: #e8dcc3;
      --homestead-clay: #a8552e;
      --prairie-sage: #6b7c5a;
      --brass: #b08d3f;
      --paper: #fffaf0;
      --white: #ffffff;
    }

    body {
      margin: 0;
      background: var(--prairie-wheat);
      font-family: "Source Serif 4", serif;
      color: var(--ledger-ink);
    }

    .archive-home-link {
      display: inline-block;
      margin-bottom: 10px;

      color: var(--prairie-sage);

      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;

      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .archive-home-link:hover {
      color: var(--homestead-clay);
      text-decoration: underline;
    }

    header {
      padding: 22px 40px;
      border-bottom: 1px solid var(--brass);
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: 2.4rem;
    }


    #search-area {
      margin-top: 18px;
      max-width: 420px;
      position: relative;
    }

    #person-search {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid var(--brass);
      border-radius: 4px;
      background: var(--paper);
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      font-size: 1rem;
    }

    #person-search:focus {
      outline: 2px solid var(--homestead-clay);
      outline-offset: 2px;
    }

    #search-results {
      display: none;
      position: absolute;
      z-index: 10;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: 280px;
      overflow-y: auto;
      background: var(--paper);
      border: 1px solid var(--brass);
      border-radius: 4px;
      box-shadow: 0 8px 22px rgba(31, 46, 69, 0.18);
    }

    .search-result {
      display: block;
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(176, 141, 63, 0.35);
      background: none;
      padding: 10px 12px;
      text-align: left;
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      cursor: pointer;
    }

    .search-result:hover,
    .search-result:focus {
      background: #fff4df;
      color: var(--homestead-clay);
      outline: none;
    }

    .search-result-name {
      display: block;
      font-weight: 600;
    }

    .search-result-dates {
      display: block;
      margin-top: 2px;
    }

    .search-empty {
      padding: 10px 12px;
    }

    #content {
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    #tree {
      flex: 2;
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    #details {
      flex: 1;
      background: var(--ledger-ink);
      color: var(--paper);
      border: 2px solid var(--brass);
      border-radius: 6px;
      padding: 28px;
      position: sticky;
      top: 20px;
      min-height: 180px;
      max-width: 390px;
      box-sizing: border-box;
      box-shadow: 0 8px 22px rgba(31, 46, 69, 0.22);
    }

    #details h2 {
      margin-top: 0;
      font-family: "Fraunces", serif;
      color: var(--homestead-clay);
      font-size: 1.8rem;
      line-height: 1.1;
    }

    #details h3 {
      margin-top: 28px;
      color: var(--brass);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #details .mono {
      color: #b7c69f;
    }

    #details .person-link {
      color: var(--paper);
    }

    #details .person-link:hover {
      color: var(--homestead-clay);
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
      color: var(--prairie-sage);
      font-size: 0.9rem;
    }

    .person-link {
      border: 0;
      background: none;
      padding: 0;
      color: var(--ledger-ink);
      font-family: inherit;
      font-size: inherit;
      text-align: left;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    .person-link:hover {
      color: var(--homestead-clay);
    }

    .pedigree-chart {
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }

    .ancestor-branches {
      display: grid;
      grid-template-columns: repeat(2, minmax(270px, 1fr));
      gap: 28px;
      align-items: start;
      justify-items: center;
    }

    .ancestor-branch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .great-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .generation-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .branch-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.7rem;
      color: var(--prairie-sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: -6px;
    }

    .generation-label {
      width: 100%;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.75rem;
      color: var(--prairie-sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: -10px;
    }

    .pedigree-couple {
      border: 1px solid var(--brass);
      background: var(--paper);
      padding: 13px 15px;
      width: 270px;
      min-height: 118px;
      min-width: 270px;
      max-width: 270px;
      box-sizing: border-box;
      text-align: center;
      box-shadow: 0 1px 0 rgba(31, 46, 69, 0.08);
    }

    .great-stack .pedigree-couple {
      height: 176px;
      min-height: 176px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .pedigree-couple.empty-card {
      background: rgba(255, 250, 240, 0.25);
      border: 1px dashed rgba(176, 141, 63, 0.45);
      box-shadow: none;
      pointer-events: none;
    }

    .ghost-line {
      visibility: hidden;
    }

    .pedigree-couple.current {
      border: 2px solid var(--homestead-clay);
      background: #fff4df;
    }

    .pedigree-person-name {
      display: block;
      width: 100%;
      border: 0;
      background: none;
      padding: 0;
      color: var(--ledger-ink);
      font-family: "Source Serif 4", serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.15;
      cursor: pointer;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .pedigree-person-name.long-name {
      font-size: 0.9rem;
    }

    .pedigree-person-name:hover {
      color: var(--homestead-clay);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .pedigree-age {
      margin-top: 2px;
    }

    .couple-divider {
      font-family: "IBM Plex Mono", monospace;
      color: var(--brass);
      font-size: 0.75rem;
      margin: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pedigree-dates {
      margin-top: 4px;
    }

    #detail-photo {
      text-align: center;
      margin-bottom: 15px;
    }

    #detail-photo img {
      width: 220px;
      max-width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid var(--brass);
    }

    .photo-gallery {
      display: none;
    }

    .photo-gallery.has-photo {
      display: block;
    }

    .photo-frame {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }

    .photo-gallery-image {
      display: block;
      width: 220px;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: 6px;
      border: 1px solid var(--brass);
    }

    .photo-gallery-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 9px;
    }

    .photo-gallery-button {
      width: 34px;
      height: 30px;
      padding: 0;
      border: 1px solid var(--brass);
      border-radius: 4px;
      background: transparent;
      color: var(--paper);
      font-family: "Source Serif 4", serif;
      font-size: 1.15rem;
      line-height: 1;
      cursor: pointer;
    }

    .photo-gallery-button:hover,
    .photo-gallery-button:focus {
      background: var(--homestead-clay);
      border-color: var(--homestead-clay);
      outline: none;
    }

    .photo-gallery-button:disabled {
      display: none;
    }

    .photo-gallery-count {
      min-width: 88px;
      color: #b7c69f;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.78rem;
    }

    .photo-gallery-caption {
      max-width: 270px;
      margin: 9px auto 0;
      color: #d8d1bd;
      font-size: 0.92rem;
      line-height: 1.35;
      font-style: italic;
    }

    #detail-story {
      margin-top: 28px;
      border-top: 1px solid var(--brass);
      padding-top: 22px;
    }

    #detail-story p {
      line-height: 1.55;
    }

    #detail-story .story-title {
      color: var(--brass);
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    #detail-story h3 {
      color: var(--homestead-clay);
      margin-top: 8px;
      margin-bottom: 12px;
    }

    .story-link {
      display: block;
      width: 100%;
      text-align: left;

      padding: 10px 0;
      margin-top: 10px;

      border: none;
      background: none;

      color: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .story-link:hover {
      color: var(--homestead-clay);
      text-decoration: underline;
    }

    .story-link::before {
      content: "▸ ";
      color: var(--homestead-clay);
    }

    .story-link.open::before {
      content: "▾ ";
    }

    .story-content {
      margin: 8px 0 18px 18px;
      color: #b7c69f;
    }

    .story-content h4 {
      color: var(--brass);
      margin-top: 18px;
      margin-bottom: 10px;
      font-size: 1rem;
    }

    .story-link {
      outline: none;
    }

    .story-link:focus {
      color: var(--homestead-clay);
    }

    .story-content em {
      font-style: italic;
    }

    .story-content blockquote {
      margin: 1.25rem 0;
      padding: 0.15rem 0 0.15rem 1rem;
      border-left: 3px solid var(--brass);
      color: #d8d1bd;
      font-style: italic;
    }

    .story-content blockquote br {
      display: block;
      content: "";
      margin-top: 0.4rem;
    }

    .story-content strong {
      font-weight: 600;
      color: var(--paper);
    }

    @media (max-width: 900px) {
      #content {
        flex-direction: column;
        padding: 24px;
      }

      #details {
        position: static;
        max-width: none;
        width: 100%;
      }



      .ancestor-branches {
        grid-template-columns: 1fr;
      }

      .pedigree-couple {
        width: 100%;
        min-width: 0;
        max-width: 360px;
      }
    }

    .person-link span {
      display: block;
    }

    .link-dates,
    .link-age {
      display: block;
      color: #b7c69f;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.88rem;
    }


    .link-name {
      color: var(--paper);
    }
  </style>
</head>

<body>

  <header>

    <a href="index.html" class="archive-home-link">
      ← The Kallmer Family Archive
    </a>

    <h1>Kallmer Family Tree</h1>

    <div id="search-area">
      <input type="text" id="person-search" placeholder="Search for a person..." autocomplete="off" />
      <div id="search-results"></div>
    </div>
  </header>

  <div id="content">
    <div id="tree"></div>

    <div id="details">
      <h2 id="detail-name">Select a Person</h2>
      <p class="mono" id="detail-dates"></p>
      <div id="detail-photo"></div>
      <div id="detail-place"></div>
      <div id="detail-story"></div>
    </div>
  </div>

  <script>
    fetch("public-data/family.json?v=" + Date.now())
      .then((response) => response.json())
      .then((data) => {
        const tree = document.getElementById("tree");
        const searchInput = document.getElementById("person-search");

        searchInput.addEventListener("focus", () => {
          setTimeout(() => searchInput.select(), 0);
        });

        searchInput.addEventListener("click", () => {
          searchInput.select();
        });

        const searchResults = document.getElementById("search-results");

        const peopleById = {};
        data.people.forEach(person => {
          peopleById[person.id] = person;
        });

        let photoFolderMap = {};
        let storyFolderMap = {};

        const mediaFolderMapsReady = Promise.all([
          fetch("photos/index.json?v=" + Date.now())
            .then(response => response.ok ? response.json() : {})
            .catch(() => ({})),

          fetch("stories/index.json?v=" + Date.now())
            .then(response => response.ok ? response.json() : {})
            .catch(() => ({}))
        ]).then(([photoMap, storyMap]) => {
          photoFolderMap = photoMap || {};
          storyFolderMap = storyMap || {};
        });

        function photoFolderFor(personId) {
          return photoFolderMap[personId] || personId;
        }

        function storyFolderFor(personId) {
          return storyFolderMap[personId] || personId;
        }


        function normalizeText(text) {
          return (text || "")
            .toLowerCase()
            .normalize("NFD")
            .replace(/[̀-ͯ]/g, "")
            .replace(/ł/g, "l")
            .replace(/ø/g, "o")
            .replace(/æ/g, "ae")
            .replace(/œ/g, "oe")
            .replace(/ð/g, "d")
            .replace(/þ/g, "th");
        }

        const searchablePeople = data.people.map(person => ({
          person,
          searchName: normalizeText(person.name)
        }));

        function hideSearchResults() {
          searchResults.style.display = "none";
          searchResults.innerHTML = "";
        }

        function renderSearchResults(matches) {
          if (matches.length === 0) {
            searchResults.innerHTML = `<div class="mono search-empty">No matching people found</div>`;
            searchResults.style.display = "block";
            return;
          }

          searchResults.innerHTML = matches.map(({ person }) => `
            <button class="search-result" data-person-id="${person.id}">
              <span class="search-result-name">${person.name}</span>
              <span class="mono search-result-dates">${lifeDates(person)}</span>
            </button>
          `).join("");

          searchResults.style.display = "block";

          searchResults.querySelectorAll(".search-result").forEach(button => {
            button.onclick = () => {
              const selectedPerson = peopleById[button.dataset.personId];
              if (selectedPerson) {
                showDetails(selectedPerson);
                searchInput.value = selectedPerson.name;
                hideSearchResults();
              }
            };
          });
        }

        function setupSearch() {
          searchInput.addEventListener("input", () => {
            const query = normalizeText(searchInput.value.trim());

            if (query.length < 2) {
              hideSearchResults();
              return;
            }

            const matches = searchablePeople
              .filter(({ searchName }) => searchName.includes(query))
              .slice(0, 12);

            renderSearchResults(matches);
          });

          searchInput.addEventListener("keydown", event => {
            if (event.key === "Escape") {
              hideSearchResults();
              searchInput.blur();
            }
          });

          document.addEventListener("click", event => {
            if (!event.target.closest("#search-area")) {
              hideSearchResults();
            }
          });
        }

        function yearFromText(text) {
          const match = String(text || "").match(/\b(1[5-9]\d{2}|20\d{2})\b/);
          return match ? parseInt(match[1], 10) : null;
        }

        function ageText(person) {
          if (!person || !person.birth) return "";

          const birthYear = yearFromText(person.birth);
          if (!birthYear) return "";

          if (person.death) {
            const deathYear = yearFromText(person.death);
            if (!deathYear) return "";

            const age = deathYear - birthYear;
            return age >= 0 && age < 125 ? ` (${age})` : "";
          }

          const currentYear = new Date().getFullYear();
          const age = currentYear - birthYear;
          return age >= 0 && age < 125 ? ` (${age})` : "";
        }

        function lifeDates(person) {
          if (!person) return "";
          const birth = person.birth || "?";
          const death = person.death ? ` – ${person.death}` : " – present";
          return `${birth}${death}${ageText(person)}`;
        }

        function birthPlace(person) {
          if (!person) return "";
          return person.birth_place || person.birthPlace || person.place || "";
        }

        function displayPlace(place) {
          if (!place) return "";

          const parts = place.split(",").map(part => part.trim());

          if (parts.length >= 3) {
            return `${parts[0]}, ${parts[parts.length - 1]}`;
          }

          return place;
        }


        function personButton(person) {
          const dates = lifeDates(person);
          const ageMatch = dates.match(/\(\d+\)$/);

          const age = ageMatch ? ageMatch[0] : "";
          const dateOnly = age ? dates.replace(age, "").trim() : dates;

          return `
    <button class="person-link" data-person-id="${person.id}">
      <span class="link-name">${person.name}</span>
      <span class="link-dates">${dateOnly}</span>
      ${age ? `<span class="link-age">${age}</span>` : ""}
    </button>
  `;
        }

        function namesFromIds(ids) {
          if (!ids || ids.length === 0) return "None listed";

          return ids
            .map(id => peopleById[id])
            .filter(Boolean)
            .map(personButton)
            .join("<br>");
        }

        function birthSortValue(person) {
          const text = String(person && person.birth || "").toUpperCase();

          const yearMatch = text.match(/\b(1[5-9]\d{2}|20\d{2})\b/);
          if (!yearMatch) return Number.POSITIVE_INFINITY;

          const year = parseInt(yearMatch[1], 10);
          const monthNames = {
            JAN: 1, FEB: 2, MAR: 3, APR: 4,
            MAY: 5, JUN: 6, JUL: 7, AUG: 8,
            SEP: 9, OCT: 10, NOV: 11, DEC: 12
          };

          const monthMatch = text.match(
            /\b(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/
          );
          const month = monthMatch ? monthNames[monthMatch[1]] : 1;

          const dayMatch = text.match(
            /\b([0-2]?\d|3[01])\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/
          );
          const day = dayMatch ? parseInt(dayMatch[1], 10) : 1;

          return (year * 10000) + (month * 100) + day;
        }

        function namesFromIdsOldestFirst(ids) {
          if (!ids || ids.length === 0) return "None listed";

          return ids
            .map(id => peopleById[id])
            .filter(Boolean)
            .sort((a, b) => {
              const dateDifference = birthSortValue(a) - birthSortValue(b);

              if (dateDifference !== 0) {
                return dateDifference;
              }

              return a.name.localeCompare(b.name);
            })
            .map(personButton)
            .join("<br>");
        }

        function marriageText(person) {
          if (!person.marriages || person.marriages.length === 0) return "";

          return person.marriages.map(m => {
            const spouse = peopleById[m.spouse];
            const spouseName = spouse ? personButton(spouse) : m.spouse;
            const details = [m.date, displayPlace(m.place)].filter(Boolean).join(" — ");

            return details
              ? `${spouseName}<br><span class="mono">${details}</span>`
              : spouseName;
          }).join("<br><br>");
        }

        function getParents(person) {
          return (person.parents || [])
            .map(id => peopleById[id])
            .filter(Boolean);
        }

        function getPrimarySpouse(person) {
          if (!person || !person.spouses || person.spouses.length === 0) return null;
          return peopleById[person.spouses[0]] || null;
        }

        function coupleKey(personA, personB) {
          const ids = [personA && personA.id, personB && personB.id]
            .filter(Boolean)
            .sort();
          return ids.join("+");
        }

        function uniquePeople(people) {
          const seen = new Set();
          return people.filter(person => {
            if (!person || seen.has(person.id)) return false;
            seen.add(person.id);
            return true;
          });
        }

        function parentCoupleFor(child) {
          const parents = getParents(child);
          if (parents.length === 0) return null;
          return { personA: parents[0] || null, personB: parents[1] || null };
        }

        function buildGrandparentBranches(person) {
          const parents = getParents(person);

          return parents.map(parent => {
            const grandparentCouple = parentCoupleFor(parent);
            if (!grandparentCouple) return null;

            const greatCouples = [
              grandparentCouple.personA ? parentCoupleFor(grandparentCouple.personA) : null,
              grandparentCouple.personB ? parentCoupleFor(grandparentCouple.personB) : null
            ];

            return {
              parent,
              grandparentCouple,
              greatCouples
            };
          }).filter(Boolean);
        }

        function pedigreePersonLine(person) {
          if (!person) return `<div class="mono">Unknown</div>`;

          const dates = lifeDates(person);
          const ageMatch = dates.match(/\(\d+\)$/);

          const age = ageMatch ? ageMatch[0] : "";
          const dateOnly = age ? dates.replace(age, "").trim() : dates;

          return `
            <button
              class="pedigree-person-name ${person.name.length > 22 ? "long-name" : ""}"
              data-person-id="${person.id}"
            > 
             ${person.name}
            </button>

            <div class="mono pedigree-dates">${dateOnly}</div>
            <div class="mono pedigree-age">${age || "&nbsp;"}</div>
         `;
        }
        function pedigreeCoupleCard(couple, isCurrent = false) {
          const personA = couple.personA;
          const personB = couple.personB;

          return `
            <div class="pedigree-couple ${isCurrent ? "current" : ""}">
              ${pedigreePersonLine(personA)}
              ${personB ? `<div class="couple-divider">and</div>${pedigreePersonLine(personB)}` : ""}
            </div>
          `;
        }

        function renderPedigree(person) {
          const branches = buildGrandparentBranches(person);
          const parentCouple = parentCoupleFor(person);

          const branchMarkup = branches.length ? `
            <div class="ancestor-branches">
              ${branches.map(branch => `
                <div class="ancestor-branch">
                  <div class="branch-label">Great-grandparents</div>
                  <div class="great-stack">
                    ${branch.greatCouples.map(couple =>
            couple
              ? pedigreeCoupleCard(couple)
              : `
                <div class="pedigree-couple empty-card">
                  <div class="pedigree-person-name ghost-line">Unknown</div>
                  <div class="mono pedigree-dates ghost-line">? – ?</div>
                  <div class="mono pedigree-age ghost-line">&nbsp;</div>
                  <div class="couple-divider ghost-line">and</div>
                  <div class="pedigree-person-name ghost-line">Unknown</div>
                  <div class="mono pedigree-dates ghost-line">? – ?</div>
                  <div class="mono pedigree-age ghost-line">&nbsp;</div>
                </div>
              `
          ).join("")}
                  </div>
                  <div class="branch-label">Grandparents</div>
                  ${pedigreeCoupleCard(branch.grandparentCouple)}
                </div>
              `).join("")}
            </div>
          ` : "";

          tree.innerHTML = `
            <div class="pedigree-chart">
              ${branchMarkup}

              ${parentCouple ? `
                <div class="generation-row">
                  <div class="generation-label">Parents</div>
                  ${pedigreeCoupleCard(parentCouple)}
                </div>
              ` : ""}

              <div class="generation-row">
                <div class="generation-label">Current family</div>
                ${pedigreeCoupleCard({ personA: person, personB: getPrimarySpouse(person) }, true)}
              </div>
            </div>
          `;

          attachPedigreeHandlers();
        }

        function attachPedigreeHandlers() {
          document.querySelectorAll(".pedigree-person-name").forEach(button => {
            button.onclick = () => {
              const nextPerson = peopleById[button.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function attachPersonLinkHandlers() {
          document.querySelectorAll(".person-link").forEach(button => {
            button.onclick = () => {
              const nextPerson = peopleById[button.dataset.personId];
              if (nextPerson) {
                showDetails(nextPerson);
              }
            };
          });
        }

        function formatInlineMarkdown(text) {
          return text
            .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
            .replace(/\*(.+?)\*/g, "<em>$1</em>")
            .replace(/\n/g, "<br>");
        }

        async function loadStory(person) {
          const storyDiv = document.getElementById("detail-story");

          storyDiv.style.display = "block";
          storyDiv.innerHTML = "";

          try {
            const response = await fetch(
              `stories/${storyFolderFor(person.id)}/index.json?v=${Date.now()}`
            );

            if (!response.ok) {
              throw new Error();
            }

            const files = await response.json();

            storyDiv.innerHTML = `
              <div class="story-title">Stories</div>
              <div id="story-links"></div>
            `;

            const linksDiv = document.getElementById("story-links");

            files.forEach(filename => {
              const label = filename
                .replace(/^\d+-/, "")
                .replace(/\.md$/, "")
                .replace(/-/g, " ")
                .replace(/\b\w/g, c => c.toUpperCase());

              const button = document.createElement("button");

              const contentDiv = document.createElement("div");
              contentDiv.className = "story-content";

              button.className = "story-link";
              button.textContent = label;

              button.onclick = async () => {

                if (button.classList.contains("open")) {
                  button.classList.remove("open");
                  contentDiv.innerHTML = "";
                  return;
                }

                document
                  .querySelectorAll(".story-link")
                  .forEach(btn => btn.classList.remove("open"));

                button.classList.add("open");

                const md = await fetch(
                  `stories/${storyFolderFor(person.id)}/${filename}?v=${Date.now()}`
                ).then(r => r.text());

                contentDiv.innerHTML =
                  md
                    .split(/\n\s*\n/)
                    .map(block => {
                      const paragraph = block.trim();

                      if (!paragraph) {
                        return "";
                      }

                      if (paragraph.startsWith("## ")) {
                        return `<h4>${formatInlineMarkdown(paragraph.substring(3))}</h4>`;
                      }

                      if (paragraph.startsWith("# ")) {
                        return `<h3>${formatInlineMarkdown(paragraph.substring(2))}</h3>`;
                      }

                      if (paragraph.startsWith("> ")) {
                        const quote = paragraph
                          .split("\n")
                          .map(line => line.replace(/^>\s?/, ""))
                          .join("\n");

                        return `<blockquote>${formatInlineMarkdown(quote)}</blockquote>`;
                      }

                      return `<p>${formatInlineMarkdown(paragraph)}</p>`;
                    })
                    .join("");
              };

              linksDiv.appendChild(button);
              linksDiv.appendChild(contentDiv);
            });

          } catch {
            storyDiv.style.display = "none";
            storyDiv.innerHTML = "";
          }
        }

        let photoGalleryRequest = 0;

        function normalizePhotoEntries(payload) {
          const rawEntries = Array.isArray(payload)
            ? payload
            : (payload && Array.isArray(payload.photos) ? payload.photos : []);

          return rawEntries
            .map(entry => {
              if (typeof entry === "string") {
                return {
                  file: entry,
                  caption: "",
                  alt: ""
                };
              }

              if (!entry || typeof entry !== "object") {
                return null;
              }

              const file = entry.file || entry.filename || entry.src || "";

              if (!file) {
                return null;
              }

              return {
                file,
                caption: entry.caption || "",
                alt: entry.alt || ""
              };
            })
            .filter(Boolean);
        }

        async function loadPhotoGallery(person) {
          const requestId = ++photoGalleryRequest;
          const photoDiv = document.getElementById("detail-photo");

          photoDiv.innerHTML = "";

          let photos = [];

          try {
            const response = await fetch(
              `photos/${photoFolderFor(person.id)}/index.json?v=${Date.now()}`
            );

            if (response.ok) {
              photos = normalizePhotoEntries(await response.json());
            }
          } catch {
            photos = [];
          }

          if (requestId !== photoGalleryRequest) {
            return;
          }

          // Existing portrait-only folders continue to work without index.json.
          if (photos.length === 0) {
            photos = [{
              file: "portrait.png",
              caption: "",
              alt: person.name
            }];
          }

          let currentIndex = 0;

          const gallery = document.createElement("div");
          gallery.className = "photo-gallery";

          const frame = document.createElement("div");
          frame.className = "photo-frame";

          const image = document.createElement("img");
          image.className = "photo-gallery-image";

          const controls = document.createElement("div");
          controls.className = "photo-gallery-controls";

          const previousButton = document.createElement("button");
          previousButton.type = "button";
          previousButton.className = "photo-gallery-button";
          previousButton.setAttribute("aria-label", "Previous photo");
          previousButton.textContent = "←";

          const count = document.createElement("span");
          count.className = "photo-gallery-count";

          const nextButton = document.createElement("button");
          nextButton.type = "button";
          nextButton.className = "photo-gallery-button";
          nextButton.setAttribute("aria-label", "Next photo");
          nextButton.textContent = "→";

          const caption = document.createElement("div");
          caption.className = "photo-gallery-caption";

          controls.append(previousButton, count, nextButton);
          frame.appendChild(image);
          gallery.append(frame, controls, caption);
          photoDiv.appendChild(gallery);

          function renderPhoto() {
            const photo = photos[currentIndex];
            const encodedFile = photo.file
              .split("/")
              .map(part => encodeURIComponent(part))
              .join("/");

            image.src = `photos/${photoFolderFor(person.id)}/${encodedFile}`;
            image.alt = photo.alt || photo.caption || person.name;

            count.textContent = photos.length > 1
              ? `Photo ${currentIndex + 1} of ${photos.length}`
              : "Photo 1 of 1";

            previousButton.disabled = photos.length < 2;
            nextButton.disabled = photos.length < 2;

            caption.textContent = photo.caption || "";
            caption.style.display = photo.caption ? "block" : "none";
          }

          previousButton.onclick = () => {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            renderPhoto();
          };

          nextButton.onclick = () => {
            currentIndex = (currentIndex + 1) % photos.length;
            renderPhoto();
          };

          image.onload = () => {
            gallery.classList.add("has-photo");
          };

          image.onerror = () => {
            // If a listed gallery image is missing, skip it when possible.
            if (photos.length > 1) {
              photos.splice(currentIndex, 1);

              if (currentIndex >= photos.length) {
                currentIndex = 0;
              }

              renderPhoto();
              return;
            }

            gallery.remove();
          };

          renderPhoto();
        }

        function showDetails(person) {

          const url = new URL(window.location);

          url.searchParams.set("person", person.id);

          history.replaceState(
            null,
            "",
            url
          );

          renderPedigree(person);

          loadPhotoGallery(person);

          document.getElementById("detail-name").textContent = person.name;
          document.getElementById("detail-dates").textContent = lifeDates(person);
          const place = displayPlace(birthPlace(person));

          document.getElementById("detail-place").innerHTML = `
            ${place ? `<p class="mono">Born: ${place}</p>` : ""}

            <h3>Parents</h3>
            <p>${namesFromIds(person.parents)}</p>

            <h3>Spouse / Marriage</h3>
            <p>${marriageText(person) || namesFromIds(person.spouses)}</p>

            <h3>Children</h3>
            <p>${namesFromIdsOldestFirst(person.children)}</p>

            <h3>Siblings</h3>
            <p>${namesFromIdsOldestFirst(person.siblings)}</p>
          `;

          loadStory(person);

          attachPersonLinkHandlers();
        }

        mediaFolderMapsReady.then(() => {
          setupSearch();

          const params = new URLSearchParams(window.location.search);
          const personId = params.get("person");

          const startPerson =
            (personId && peopleById[personId]) ||
            peopleById["I0000"] ||
            data.people[0];

          showDetails(startPerson);
        });
      });
  </script>
