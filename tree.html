<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Family Tree</title>

  <style>
    :root {
      --ledger-ink: #1f2e45;
      --prairie-wheat: #e8dcc3;
      --homestead-clay: #a8552e;
      --prairie-sage: #6b7c5a;
      --brass: #b08d3f;
    }

    body {
      margin: 0;
      background: var(--prairie-wheat);
      font-family: serif;
      color: var(--ledger-ink);
    }

    header {
      padding: 20px;
      border-bottom: 1px solid var(--brass);
    }

    h1 {
      margin: 0;
    }

    #content {
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    #tree {
      flex: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .person {
      width: 260px;
      min-height: 130px;
      box-sizing: border-box;
    }

    #details {
      flex: 1;
      background: white;
      border: 1px solid var(--brass);
      padding: 24px;
      position: sticky;
      top: 20px;
      min-height: 180px;
    }

    .person {
      border: 1px solid var(--brass);
      background: white;
      padding: 20px;
      min-width: 250px;
      width: 260px;
      text-align: center;
    }

    .person h2 {
      margin-top: 0;
    }

    .mono {
      font-family: monospace;
      color: var(--prairie-sage);
    }

    #tree {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      padding: 40px;
      height: auto;
    }


    .person-card-selected {
      border: 3px solid var(--homestead-clay);
    }
  </style>
</head>

<body>
  <header>
    <h1>Kallmer Family Tree</h1>
  </header>

  <div id="content">

    <div id="tree"></div>

    <div id="details">

      <h2 id="detail-name">
        Select a Person
      </h2>

      <p class="mono" id="detail-dates"></p>

      <p id="detail-place"></p>

    </div>

  </div>
  <h2 id="detail-name"></h2>

  <p class="mono" id="detail-dates"></p>

  <p id="detail-place"></p>
  </div>

  <script>
    fetch("public-data/family.json")
      .then((response) => response.json())
      .then((data) => {
        const tree = document.getElementById("tree");

        data.people.slice(0, 10).forEach((person) => {
          const card = document.createElement("div");

          card.className = "person";

          card.innerHTML = `
              <h2>${person.name}</h2>

              <p class="mono">
                ${person.birth}${person.death ? "–" + person.death : "–"}
              </p>
            `;
          card.style.cursor = "pointer";

          card.onclick = () => {

            document.querySelectorAll(".person-card-selected")
              .forEach(el => el.classList.remove("person-card-selected"));

            card.classList.add("person-card-selected");
            document.getElementById("details").style.display = "block";

            document.getElementById("detail-name").textContent = person.name;

            document.getElementById("detail-dates").textContent =
              `${person.birth || "?"}${person.death ? "–" + person.death : "–"}`;

            document.getElementById("detail-place").textContent =
              person.place || "";
          };
          tree.appendChild(card);
        });
      });
  </script>
</body>

</html>
